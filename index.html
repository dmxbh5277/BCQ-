<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Báo Cáo Quy Đổi</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { font-family: 'Google Sans', sans-serif; overflow: hidden; background-color: #f3f4f6; }
        .page-container { height: 100dvh; display: flex; flex-direction: column; background: white; }
        .scroll-area { flex: 1; overflow-y: auto; }
        
        tr { height: 25px !important; }
        input { width: 100%; height: 100%; text-align: center; background: transparent; outline: none; font-size: 12px; }
        input:focus { background: #f0f7ff; }
        
        td, th { border-right: 1px solid #e5e7eb; padding: 0 4px; }
        td:last-child, th:last-child { border-right: none; }
        .center-col { text-align: center; }
    </style>
</head>
<body>

    <div id="report-area" class="page-container max-w-md mx-auto shadow-xl">
        
        <div class="bg-[#0070c0] text-white p-2 flex-none">
            <div class="flex items-center gap-2 mb-2">
                <div class="w-1/3 bg-black/20 rounded p-1">
                    <span class="text-[8px] uppercase opacity-70 block text-center">Nhân viên</span>
                    <input type="text" placeholder="..." class="text-yellow-300 font-bold text-[11px] placeholder-yellow-300/50">
                </div>
                <div class="flex-1 text-center font-bold text-[13px] uppercase tracking-tight leading-tight">
                    Báo Cáo Quy Đổi<br><span class="opacity-80 text-[10px] font-normal">Trả Chậm</span>
                </div>
            </div>
            
            <div class="grid grid-cols-3 gap-1">
                <div class="bg-black/10 rounded p-1 text-center flex flex-col items-center justify-center">
                    <span class="text-[9px] uppercase opacity-80">Ngày</span>
                    <input type="text" id="date-display" value="16/07" class="text-white font-bold text-xs text-center p-0">
                </div>
                <div class="bg-black/10 rounded p-1 text-center"><span class="text-[9px] uppercase opacity-80">Quy đổi</span><div id="h1" class="text-md font-black text-yellow-300">0%</div></div>
                <div class="bg-black/10 rounded p-1 text-center"><span class="text-[9px] uppercase opacity-80">Trả chậm</span><div id="i1" class="text-md font-black text-yellow-300">0%</div></div>
            </div>
        </div>

        <div data-html2canvas-ignore class="p-1.5 bg-white border-b border-gray-200 flex gap-2 flex-none">
            <button onclick="resetData()" class="flex-1 py-1.5 bg-gray-100 text-gray-600 rounded font-bold text-[11px] uppercase">Xóa</button>
            <button onclick="captureReport()" class="flex-1 py-1.5 bg-[#0070c0] text-white rounded font-bold text-[11px] uppercase">Chụp báo cáo</button>
        </div>

        <div class="scroll-area" id="scroll-content">
            <table class="w-full border-collapse table-fixed min-w-[600px]">
                <thead class="bg-gray-50 text-[10px] text-gray-500 uppercase">
                    <tr class="border-b border-gray-200">
                        <th class="w-20 sticky left-0 bg-gray-50 text-left px-2">Nhóm</th>
                        <th class="w-12">Hệ số</th>
                        <th class="w-10">SL</th>
                        <th class="w-16">T.mặt</th>
                        <th class="w-16">T.Góp</th>
                        <th class="w-16">Ví</th>
                        <th class="w-16">DTQĐ</th>
                        <th class="w-14">PMH</th>
                    </tr>
                </thead>
                <tbody id="data-rows" class="text-[11px] text-gray-700"></tbody>
            </table>
        </div>
    </div>

    <script>
        const config = [
            { n: 'Tivi', hs: 1.0 }, { n: 'Tủ lạnh', hs: 1.0 }, { n: 'Máy lạnh', hs: 1.0 },
            { n: 'Máy giặt', hs: 1.0 }, { n: 'Smartphone', hs: 1.0 }, { n: 'Tablet/Laptop', hs: 1.2 },
            { n: 'ĐGD/MLN', hs: 1.85 }, { n: 'DCNB', hs: 1.92 }, { n: 'VAS', hs: 3.3 },
            { n: 'Bảo hiểm', hs: 4.18 }, { n: 'Sim', hs: 5.45 }, { n: 'Phụ kiện', hs: 3.37 },
            { n: 'Đồng hồ', hs: 3.0 }, { n: 'Loa Karaoke', hs: 1.29 }
        ];

        const tbody = document.getElementById('data-rows');
        config.forEach((item, i) => {
            const row = document.createElement('tr');
            row.className = "border-b border-gray-100";
            row.innerHTML = `<td class="sticky left-0 bg-white font-bold px-2 text-left truncate">${item.n}</td>
                <td class="center-col font-medium">${Math.round(item.hs * 100)}%</td>
                <td class="p-0"><input type="text" inputmode="numeric" oninput="format(this); calc();" class="text-red-600 font-bold"></td>
                <td class="p-0"><input type="text" inputmode="numeric" id="d-${i}" oninput="format(this); calc();"></td>
                <td class="p-0"><input type="text" inputmode="numeric" id="e-${i}" oninput="format(this); calc();"></td>
                <td class="p-0"><input type="text" inputmode="numeric" id="f-${i}" oninput="format(this); calc();"></td>
                <td id="g-${i}" class="center-col font-bold text-blue-600 bg-blue-50/20"></td>
                <td class="p-0"><input type="text"></td>`;
            tbody.appendChild(row);
        });

        function format(e) { e.value = e.value.replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function getV(id) { return parseFloat(document.getElementById(id).value.replace(/\./g, "")) || 0; }
        
        function calc() {
            let sDF = 0, sEF = 0, sG = 0;
            config.forEach((item, i) => {
                const d = getV(`d-${i}`), e = getV(`e-${i}`), f = getV(`f-${i}`);
                const df = d + e + f, ef = e + f;
                if(df > 0) {
                    const g = (df * item.hs) + (ef * 0.3);
                    document.getElementById(`g-${i}`).innerText = Math.round(g).toLocaleString('vi-VN');
                    sG += g; sDF += df; sEF += ef;
                } else document.getElementById(`g-${i}`).innerText = '';
            });
            document.getElementById('h1').innerText = sDF ? Math.round(sEF/sDF*100) + '%' : '0%';
            document.getElementById('i1').innerText = sDF ? Math.round((sG-sDF)/sDF*100) + '%' : '0%';
        }

        function resetData() { document.querySelectorAll('input').forEach(i => { if(i.id !== 'date-display') i.value = ''; }); calc(); }
        
        // HÀM CHỤP ẢNH ĐÃ SỬA LỖI
        function captureReport() {
            const el = document.getElementById('report-area');
            html2canvas(el, { 
                scale: 2, 
                backgroundColor: "#ffffff",
                windowWidth: el.scrollWidth,
                windowHeight: el.scrollHeight 
            }).then(c => {
                const a = document.createElement('a'); 
                a.download = 'Bao-Cao-Quy-Doi.png'; 
                a.href = c.toDataURL("image/png"); 
                a.click();
            });
        }
    </script>
</body>
</html>
