<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Báo Cáo Quy Đổi</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { font-family: 'Google Sans', sans-serif; overflow: hidden; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Dùng 100dvh để ép trình duyệt luôn nhận đúng chiều cao màn hình thực tế */
        .page-container {
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            background: white;
        }
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }
        tr { height: 30px !important; }
        input { height: 100%; width: 100%; text-align: center; background: transparent; font-size: 12px; }
    </style>
</head>
<body>

    <div id="report-area" class="page-container max-w-md mx-auto shadow-xl">
        
        <div class="bg-[#0070c0] text-white p-2.5 flex-none z-30 shadow-sm">
            <h1 class="text-center font-bold text-sm uppercase mb-2 tracking-wide">Báo Cáo Quy Đổi - Trả Chậm</h1>
            <div class="grid grid-cols-3 gap-2">
                <div class="bg-[#0d47a1] rounded p-1 flex flex-col items-center"><span class="text-[9px] uppercase font-bold text-blue-200">Ngày áp dụng</span><input type="date" id="b1" class="bg-transparent text-white font-bold text-xs w-full text-center focus:outline-none mt-0.5"></div>
                <div class="bg-[#0d47a1] rounded p-1 flex flex-col items-center"><span class="text-[9px] uppercase font-bold text-blue-200">Quy đổi (H1)</span><span id="h1" class="text-xl font-black text-yellow-400 mt-0.5">0%</span></div>
                <div class="bg-[#0d47a1] rounded p-1 flex flex-col items-center"><span class="text-[9px] uppercase font-bold text-blue-200">Trả chậm (I1)</span><span id="i1" class="text-xl font-black text-yellow-400 mt-0.5">0%</span></div>
            </div>
        </div>

        <div class="scroll-area">
            <table class="w-full border-collapse table-fixed min-w-[640px]">
                <thead class="bg-[#fce4d6] sticky top-0 z-20 text-xs">
                    <tr>
                        <th class="w-20 sticky left-0 bg-[#fce4d6] border-r">Nhóm</th>
                        <th class="w-12 border-r">Hệ số</th>
                        <th class="w-10 border-r text-red-600">SL</th>
                        <th class="w-16 border-r">T.mặt</th>
                        <th class="w-16 border-r">T.Góp</th>
                        <th class="w-16 border-r">Ví</th>
                        <th class="w-16 border-r text-blue-700">DTQĐ</th>
                        <th class="w-14 border-r">PMH</th>
                        <th class="w-20">Khác</th>
                    </tr>
                </thead>
                <tbody id="data-rows" class="text-[11px]"></tbody>
            </table>
        </div>

        <div data-html2canvas-ignore class="flex-none p-2 bg-gray-50 border-t flex gap-2">
            <button onclick="resetData()" class="flex-1 py-2 bg-gray-200 text-gray-700 rounded font-bold uppercase text-xs">Xóa</button>
            <button onclick="captureReport()" class="flex-1 py-2 bg-[#0070c0] text-white rounded font-bold uppercase text-xs">Chụp báo cáo</button>
        </div>
    </div>

    <script>
        // (Giữ nguyên logic JavaScript cũ của bạn)
        const config = [
            { n: 'Tivi', hs: 1.0 }, { n: 'Tủ lạnh', hs: 1.0 }, { n: 'Máy lạnh', hs: 1.0 },
            { n: 'Máy giặt', hs: 1.0 }, { n: 'Smartphone', hs: 1.0 }, { n: 'Tablet/Laptop', hs: 1.2 },
            { n: 'ĐGD/MLN', hs: 1.85 }, { n: 'DCNB', hs: 1.92 }, { n: 'VAS', hs: 3.3 },
            { n: 'Bảo hiểm', hs: 4.18 }, { n: 'Sim', hs: 5.45 }, { n: 'Phụ kiện', hs: 3.37 },
            { n: 'Đồng hồ', hs: 3.0 }, { n: 'Loa Karaoke', hs: 1.29 }
        ];

        document.getElementById('b1').valueAsDate = new Date();
        const tbody = document.getElementById('data-rows');
        
        config.forEach((item, i) => {
            const row = document.createElement('tr');
            row.innerHTML = `<td class="sticky left-0 bg-white font-bold px-1 border-r text-left truncate">${item.n}</td>
                <td class="border-r">${Math.round(item.hs * 100)}%</td>
                <td class="border-r p-0"><input type="text" inputmode="numeric" oninput="format(this); calc();" class="text-red-600 font-bold"></td>
                <td class="border-r p-0"><input type="text" inputmode="numeric" id="d-${i}" oninput="format(this); calc();"></td>
                <td class="border-r p-0"><input type="text" inputmode="numeric" id="e-${i}" oninput="format(this); calc();"></td>
                <td class="border-r p-0"><input type="text" inputmode="numeric" id="f-${i}" oninput="format(this); calc();"></td>
                <td id="g-${i}" class="border-r font-bold text-blue-700 bg-gray-50"></td>
                <td class="border-r p-0"><input type="text"></td>
                <td class="p-0"><input type="text"></td>`;
            tbody.appendChild(row);
        });

        function format(e) { e.value = e.value.replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function getV(id) { return parseFloat(document.getElementById(id).value.replace(/\./g, "")) || 0; }
        
        function calc() {
            let sDF = 0, sEF = 0, sG = 0;
            config.forEach((item, i) => {
                const d = getV(`d-${i}`), e = getV(`e-${i}`), f = getV(`f-${i}`);
                const df = d + e + f, ef = e + f;
                if(df > 0) {
                    const g = (df * item.hs) + (ef * 0.3);
                    document.getElementById(`g-${i}`).innerText = Math.round(g).toLocaleString('vi-VN');
                    sG += g; sDF += df; sEF += ef;
                } else document.getElementById(`g-${i}`).innerText = '';
            });
            document.getElementById('h1').innerText = sDF ? Math.round(sEF/sDF*100) + '%' : '0%';
            document.getElementById('i1').innerText = sDF ? Math.round((sG-sDF)/sDF*100) + '%' : '0%';
        }

        function resetData() { document.querySelectorAll('input').forEach(i => i.value = ''); calc(); }
        function captureReport() {
            html2canvas(document.getElementById('report-area'), { scale: 2 }).then(c => {
                const a = document.createElement('a'); a.download = 'bao-cao.png'; a.href = c.toDataURL(); a.click();
            });
        }
    </script>
</body>
</html>
