<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=3.0">
    <title>Báo Cáo Quy Đổi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap');
        * { box-sizing: border-box; }
        body { font-family: 'Google Sans', sans-serif; margin: 0; background: #f3f4f6; touch-action: manipulation; }
        .container { min-width: 400px; min-height: 100vh; display: flex; flex-direction: column; background: white; }
        
        .header { background: #0070c0; color: white; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .header-top { display: flex; gap: 8px; align-items: center; position: relative; }
        
        /* Nút Xóa nhỏ ở góc phải */
        .btn-reset-top { position: absolute; right: 0; background: #ef4444; color: white; border: none; padding: 2px 6px; font-size: 8px; border-radius: 3px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        
        .input-box { background: rgba(0,0,0,0.2); border-radius: 4px; padding: 4px; flex: 1; height: 50px; display: flex; flex-direction: column; justify-content: center; }
        .label { font-size: 7px; opacity: 0.8; text-transform: uppercase; text-align: center; }
        .input-val { background: none; border: none; color: #fde047; font-weight: bold; text-align: center; font-size: 12px; width: 100%; outline: none; }
        .big-stat { font-size: 18px; font-weight: 700; color: #fde047; text-align: center; }

        .table-wrap { flex: 1; overflow-x: auto; background: white; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1px solid #e5e7eb; }
        thead { background: #005a9e; color: white; }
        th { font-size: 9px; font-weight: 700; border: 1px solid #0070c0; padding: 4px 2px; text-transform: uppercase; }
        
        tr { height: 24px; }
        td { border: 1px solid #e5e7eb; padding: 0; text-align: center; }
        
        /* Font nhập liệu nhỏ hơn 30% */
        .cell-input { width: 100%; height: 22px; border: none; text-align: center; font-size: 8.5px; font-weight: 500; outline: none; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 10; text-align: left; padding-left: 6px; font-weight: bold; font-size: 10px; border-right: 1px solid #e5e7eb; }
        .hs-col { font-size: 8.5px; color: #dc2626; font-weight: bold; }
        .dtqd-col { font-weight: bold; color: #dc2626; font-size: 9px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-top">
            <div style="flex: 1; text-align: center; font-weight: bold; font-size: 13px;">BÁO CÁO QUY ĐỔI</div>
            <button onclick="resetData()" class="btn-reset-top">Xóa</button>
        </div>
        <div class="header-top">
            <div class="input-box">
                <div class="label">Nhân Viên</div>
                <input type="text" id="nv-name" class="input-val" placeholder="..." oninput="saveData()">
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
            <div class="input-box">
                <div class="label">Ngày</div>
                <input type="text" id="date-display" class="input-val" style="color:white; font-size: 14px;" oninput="saveData()">
            </div>
            <div class="input-box">
                <div class="label">Quy đổi</div>
                <div id="h1" class="big-stat">0%</div>
            </div>
            <div class="input-box">
                <div class="label">Trả chậm</div>
                <div id="i1" class="big-stat">0%</div>
            </div>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th style="width: 70px;">Nhóm</th>
                    <th style="width: 40px;">Hệ số</th>
                    <th style="width: 25px;">SL</th>
                    <th style="width: 35px;">T.Mặt</th>
                    <th style="width: 35px;">T.Góp</th>
                    <th style="width: 35px;">Ví</th>
                    <th style="width: 45px;">DTQĐ</th>
                    <th style="width: 45px;">PMH</th>
                    <th style="width: 55px;">K.thác</th>
                </tr>
            </thead>
            <tbody id="data-rows"></tbody>
        </table>
    </div>
</div>

<script>
    const config = [
        { n: 'Tivi', hs: 1.0 }, { n: 'Tủ lạnh', hs: 1.0 }, { n: 'Smartphone', hs: 1.0 },
        { n: 'Tablet/Lap', hs: 1.2 }, { n: 'ĐGD/MLN', hs: 1.85 }, { n: 'DCNB', hs: 1.92 },
        { n: 'VAS', hs: 3.3 }, { n: 'Bảo hiểm', hs: 4.18 }, { n: 'Sim', hs: 5.45 },
        { n: 'Phụ kiện', hs: 3.37 }, { n: 'Đồng hồ', hs: 3.0 }, { n: 'Loa Kara', hs: 1.29 }
    ];

    const tbody = document.getElementById('data-rows');
    config.forEach((item, i) => {
        const row = document.createElement('tr');
        row.innerHTML = `<td class="sticky-col">${item.n}</td>
            <td class="hs-col">${Math.round(item.hs * 100)}%</td>
            <td><input type="text" class="cell-input data-input" id="sl-${i}" oninput="format(this); calc(); saveData();"></td>
            <td><input type="text" id="d-${i}" class="cell-input data-input" oninput="format(this); calc(); saveData();"></td>
            <td><input type="text" id="e-${i}" class="cell-input data-input" oninput="format(this); calc(); saveData();"></td>
            <td><input type="text" id="f-${i}" class="cell-input data-input" oninput="format(this); calc(); saveData();"></td>
            <td id="g-${i}" class="dtqd-col"></td>
            <td><input type="text" class="cell-input data-input" id="pmh-${i}" oninput="saveData()"></td>
            <td><input type="text" class="cell-input data-input" id="kt-${i}" oninput="saveData()"></td>`;
        tbody.appendChild(row);
    });

    function format(e) { e.value = e.value.replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
    function getV(id) { return parseFloat(document.getElementById(id).value.replace(/\./g, "")) || 0; }
    
    function calc() {
        let sDF = 0, sEF = 0, sG = 0;
        config.forEach((item, i) => {
            const d = getV(`d-${i}`), e = getV(`e-${i}`), f = getV(`f-${i}`);
            const df = d + e + f, ef = e + f;
            if(df > 0) {
                const g = (df * item.hs) + (ef * 0.3);
                document.getElementById(`g-${i}`).innerText = Math.round(g).toLocaleString('vi-VN');
                sG += g; sDF += df; sEF += ef;
            } else document.getElementById(`g-${i}`).innerText = '';
        });
        document.getElementById('h1').innerText = sDF ? Math.round(sEF/sDF*100) + '%' : '0%';
        document.getElementById('i1').innerText = sDF ? Math.round((sG-sDF)/sDF*100) + '%' : '0%';
    }

    function saveData() {
        const data = {};
        document.querySelectorAll('input').forEach(input => { data[input.id] = input.value; });
        localStorage.setItem('reportData', JSON.stringify(data));
    }

    window.onload = function() {
        const saved = localStorage.getItem('reportData');
        if (saved) {
            const data = JSON.parse(saved);
            Object.keys(data).forEach(id => { const el = document.getElementById(id); if (el) el.value = data[id]; });
            calc();
        } else {
            const now = new Date();
            document.getElementById('date-display').value = `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}`;
        }
    };

    function resetData() { 
        document.querySelectorAll('.data-input').forEach(i => i.value = ''); 
        localStorage.removeItem('reportData');
        calc(); 
    }
</script>
</body>
</html>
