<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=3.0">
    <title>Báo Cáo Quy Đổi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap');
        
        * { box-sizing: border-box; }
        body { font-family: 'Google Sans', sans-serif; margin: 0; background: #f3f4f6; touch-action: manipulation; }
        
        .container { min-width: 600px; min-height: 100vh; display: flex; flex-direction: column; background: white; }
        
        /* HEADER */
        .header { background: #0070c0; color: white; padding: 40px; display: flex; flex-direction: column; gap: 20px; }
        .header-top { display: flex; gap: 8px; align-items: center; }
        .input-box { background: rgba(0,0,0,0.2); border-radius: 30px; padding: 70px; flex: 1; height: 50px; display: flex; flex-direction: column; justify-content: center; }
        .label { font-size: 20px; opacity: 0.8; text-transform: uppercase; text-align: center; }
        .input-val { background: none; border: none; color: #fde047; font-weight: bold; text-align: center; font-size: 70px; width: 100%; outline: none; }
        
        /* TABLE - ĐÃ CẬP NHẬT KẺ Ô DỌC NGANG */
        .table-wrap { flex: 1; overflow-x: auto; background: white; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1px solid #e5e7eb; }
        tr { height: 20px; }
        th { font-size: 20px; color: #666; background: #f9fafb; border: 1px solid #e5e7eb; padding: 10px; }
        td { border: 1px solid #e5e7eb; padding: 0; text-align: center; }
        .cell-input { width: 100%; height: 20px; border: none; text-align: center; font-size: 10px; outline: none; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 10; text-align: left; padding-left: 6px; font-weight: bold; font-size: 30px; border-right: 1px solid #e5e7eb; }
        
        /* FOOTER */
        .footer { padding: 10px; background: white; }
        .btn-reset { width: 100%; padding: 10px; background: #ef4444; color: white; border: none; border-radius: 4px; font-weight: bold; font-size: 11px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-top">
            <div class="input-box">
                <div class="label">Nhân Viên</div>
                <input type="text" id="nv-name" class="input-val" placeholder="...">
            </div>
            <div style="flex: 1; text-align: center; font-weight: bold; font-size: 50px;">BÁO CÁO QUY ĐỔI - TRẢ CHẬM</div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
            <div class="input-box">
                <div class="label">Ngày</div>
                <input type="text" value="16/07" class="input-val" style="color:white">
            </div>
            <div class="input-box">
                <div class="label">Quy đổi</div>
                <div id="h1" class="input-val" style="color:#fde047">0%</div>
            </div>
            <div class="input-box">
                <div class="label">Trả chậm</div>
                <div id="i1" class="input-val" style="color:#fde047">0%</div>
            </div>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th style="width: 45px;">Nhóm</th>
                    <th style="width: 10px;">Hệ số</th>
                    <th style="width: 5px;">SL</th>
                    <th style="width: 30px;">T.Mặt</th>
                    <th style="width: 30px;">T.Góp</th>
                    <th style="width: 30px;">Ví</th>
                    <th style="width: 50px;">DTQĐ</th>
                    <th style="width: 40px;">PMH</th>
                    <th style="width: 70px;">Khai thác</th>
                </tr>
            </thead>
            <tbody id="data-rows"></tbody>
        </table>
    </div>

    <div class="footer">
        <button onclick="resetData()" class="btn-reset">Xóa toàn bộ dữ liệu</button>
    </div>
</div>

<script>
    const config = [
        { n: 'Tivi', hs: 1.0 }, { n: 'Tủ lạnh', hs: 1.0 }, { n: 'Smartphone', hs: 1.0 },
        { n: 'Tablet/Lap', hs: 1.2 }, { n: 'ĐGD/MLN', hs: 1.85 }, { n: 'DCNB', hs: 1.92 },
        { n: 'VAS', hs: 3.3 }, { n: 'Bảo hiểm', hs: 4.18 }, { n: 'Sim', hs: 5.45 },
        { n: 'Phụ kiện', hs: 3.37 }, { n: 'Đồng hồ', hs: 3.0 }, { n: 'Loa Kara', hs: 1.29 }
    ];

    const tbody = document.getElementById('data-rows');
    config.forEach((item, i) => {
        const row = document.createElement('tr');
        row.innerHTML = `<td class="sticky-col">${item.n}</td>
            <td style="font-size:10px;">${Math.round(item.hs * 100)}%</td>
            <td><input type="text" class="cell-input data-input text-red-600 font-bold" oninput="format(this); calc();"></td>
            <td><input type="text" id="d-${i}" class="cell-input data-input" oninput="format(this); calc();"></td>
            <td><input type="text" id="e-${i}" class="cell-input data-input" oninput="format(this); calc();"></td>
            <td><input type="text" id="f-${i}" class="cell-input data-input" oninput="format(this); calc();"></td>
            <td id="g-${i}" style="font-weight:bold; color:#0070c0; font-size:10px;"></td>
            <td><input type="text" class="cell-input data-input"></td>
            <td><input type="text" class="cell-input data-input"></td>`;
        tbody.appendChild(row);
    });

    function format(e) { e.value = e.value.replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
    function getV(id) { return parseFloat(document.getElementById(id).value.replace(/\./g, "")) || 0; }
    
    function calc() {
        let sDF = 0, sEF = 0, sG = 0;
        config.forEach((item, i) => {
            const d = getV(`d-${i}`), e = getV(`e-${i}`), f = getV(`f-${i}`);
            const df = d + e + f, ef = e + f;
            if(df > 0) {
                const g = (df * item.hs) + (ef * 0.3);
                document.getElementById(`g-${i}`).innerText = Math.round(g).toLocaleString('vi-VN');
                sG += g; sDF += df; sEF += ef;
            } else document.getElementById(`g-${i}`).innerText = '';
        });
        document.getElementById('h1').innerText = sDF ? Math.round(sEF/sDF*100) + '%' : '0%';
        document.getElementById('i1').innerText = sDF ? Math.round((sG-sDF)/sDF*100) + '%' : '0%';
    }

    function resetData() { document.querySelectorAll('.data-input').forEach(i => i.value = ''); calc(); }
</script>
</body>
</html>
