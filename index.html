<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=3.0">
    <title>Báo Cáo Quy Đổi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap');
        * { box-sizing: border-box; }
        body { font-family: 'Google Sans', sans-serif; margin: 0; background: #f3f4f6; touch-action: manipulation; }
        .container { min-width: 400px; display: flex; flex-direction: column; background: white; padding: 5px; }
        
        .header { background: #0070c0; color: white; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .header-top { display: flex; gap: 8px; align-items: center; position: relative; }
        
        .btn-action { border: none; padding: 4px 8px; font-size: 8px; border-radius: 3px; font-weight: bold; text-transform: uppercase; cursor: pointer; color: white; }
        .btn-capture { background: #10b981; }
        .btn-reset-top { background: #ef4444; }
        .btn-group { display: flex; gap: 4px; position: absolute; right: 0; }
        
        .grid-header { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .input-box { background: rgba(0,0,0,0.2); border-radius: 4px; padding: 4px; height: 45px; display: flex; flex-direction: column; justify-content: center; }
        .label { font-size: 7px; opacity: 0.8; text-transform: uppercase; text-align: center; }
        .input-val { background: none; border: none; color: #fde047; font-weight: bold; text-align: center; font-size: 20px; width: 100%; outline: none; }
        .stat-val { font-size: 20px; font-weight: bold; color: #fde047; text-align: center; }

        .table-wrap { flex: 1; overflow-x: auto; background: white; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1px solid #e5e7eb; }
        thead { background: #005a9e; color: white; }
        th { font-size: 9px; font-weight: 700; border: 1px solid #0070c0; padding: 4px 2px; text-transform: uppercase; }
        tr { height: 24px; }
        td { border: 1px solid #e5e7eb; padding: 0; text-align: center; }
        
        .cell-input { width: 100%; height: 22px; border: none; text-align: center; font-size: 8.5px; font-weight: 500; outline: none; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 10; text-align: left; padding-left: 6px; font-weight: bold; font-size: 10px; border-right: 1px solid #e5e7eb; }
        .hs-col { font-size: 8.5px; color: #dc2626; font-weight: bold; }
        .dtqd-col { font-weight: bold; color: #dc2626; font-size: 9px; }
    </style>
</head>
<body>

<div class="container" id="capture-area">
    <div class="header" id="header-part">
        <div class="header-top">
            <div style="flex: 1; text-align: center; font-weight: bold; font-size: 13px;">BÁO CÁO QUY ĐỔI</div>
            <div class="btn-group" id="btn-group">
                <button onclick="downloadReport()" class="btn-action btn-capture">Tải Ảnh</button>
                <button onclick="resetData()" class="btn-action btn-reset-top">Xóa</button>
            </div>
        </div>
        <div class="grid-header">
            <div class="input-box"><div class="label">Tên NV</div><input type="text" id="nv-name" class="input-val" oninput="saveData()"></div>
            <div class="input-box"><div class="label">Tổng Doanh Thu</div><div id="total-rev" class="stat-val">0</div></div>
            <div class="input-box"><div class="label">Trả Góp %</div><div id="h1" class="stat-val">0%</div></div>
            
            <div class="input-box"><div class="label">Ngày</div><div id="date-display" class="stat-val">--/--</div></div>
            <div class="input-box"><div class="label">Tổng DT Góp</div><div id="tg-rev" class="stat-val">0</div></div>
            <div class="input-box"><div class="label">Quy đổi %</div><div id="i1" class="stat-val">0%</div></div>
        </div>
    </div>

    <div class="table-wrap" id="table-part">
        <table>
            <thead>
                <tr>
                    <th style="width: 70px;">Nhóm</th>
                    <th style="width: 40px;">Hệ số</th>
                    <th style="width: 25px;">SL</th>
                    <th style="width: 35px;">T.Mặt</th>
                    <th style="width: 35px;">T.Góp</th>
                    <th style="width: 35px;">Ví</th>
                    <th style="width: 45px;">DTQĐ</th>
                    <th style="width: 55px;">PMH</th>
                    <th style="width: 65px;">K.thác</th>
                </tr>
            </thead>
            <tbody id="data-rows"></tbody>
        </table>
    </div>
</div>

<script>
    const config = [
        { n: 'Tivi', hs: 1.0 }, { n: 'Tủ lạnh', hs: 1.0 }, { n: 'Máy lạnh/MNN', hs: 1.0 }, { n: 'Máy Giặt', hs: 1.0 },
        { n: 'Smartphone', hs: 1.0 }, { n: 'Tab/Lap', hs: 1.2 }, { n: 'Sim', hs: 5.45 }, { n: 'Bảo hiểm', hs: 4.18 }, 
        { n: 'Phụ kiện', hs: 3.37 }, { n: 'VAS', hs: 3.3 }, { n: 'ĐGD/MLN', hs: 1.85 }, { n: 'DCNB', hs: 1.92 },
        { n: 'Đồng hồ', hs: 3.0 }, { n: 'Loa Kara', hs: 1.29 }
    ];

    const tbody = document.getElementById('data-rows');
    config.forEach((item, i) => {
        const row = document.createElement('tr');
        row.innerHTML = `<td class="sticky-col">${item.n}</td>
            <td class="hs-col">${Math.round(item.hs * 100)}%</td>
            <td><input type="text" class="cell-input data-input" id="sl-${i}" oninput="format(this); calc(); saveData();"></td>
            <td><input type="text" id="d-${i}" class="cell-input data-input" oninput="format(this); calc(); saveData();"></td>
            <td><input type="text" id="e-${i}" class="cell-input data-input" oninput="format(this); calc(); saveData();"></td>
            <td><input type="text" id="f-${i}" class="cell-input data-input" oninput="format(this); calc(); saveData();"></td>
            <td id="g-${i}" class="dtqd-col"></td>
            <td><input type="text" class="cell-input data-input" id="pmh-${i}" oninput="saveData()"></td>
            <td><input type="text" class="cell-input data-input" id="kt-${i}" oninput="saveData()"></td>`;
        tbody.appendChild(row);
    });

    async function downloadReport() {
        const btnGroup = document.getElementById('btn-group');
        btnGroup.style.display = 'none';

        const canvas = await html2canvas(document.getElementById('capture-area'), {
            scale: 3, 
            logging: false,
            useCORS: true,
            windowWidth: document.getElementById('capture-area').scrollWidth,
            windowHeight: document.getElementById('capture-area').scrollHeight
        });

        const link = document.createElement('a');
        const date = document.getElementById('date-display').innerText.replace(/\//g, '-') || 'baocao';
        link.download = `BaoCao_${date}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
        
        btnGroup.style.display = 'flex';
    }

    function format(e) { e.value = e.value.replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
    function getV(id) { return parseFloat(document.getElementById(id).value.replace(/\./g, "")) || 0; }
    function calc() {
        let sDF = 0, sEF = 0, sG = 0, sTotal = 0, sTG = 0;
        config.forEach((item, i) => {
            const d = getV(`d-${i}`), e = getV(`e-${i}`), f = getV(`f-${i}`);
            const df = d + e + f, ef = e + f;
            sTotal += df; sTG += ef;
            if(df > 0) {
                const g = (df * item.hs) + (ef * 0.3);
                document.getElementById(`g-${i}`).innerText = Math.round(g).toLocaleString('vi-VN');
                sG += g; sDF += df; sEF += ef;
            } else document.getElementById(`g-${i}`).innerText = '';
        });
        document.getElementById('h1').innerText = sDF ? Math.round(sEF/sDF*100) + '%' : '0%';
        document.getElementById('i1').innerText = sDF ? Math.round((sG-sDF)/sDF*100) + '%' : '0%';
        document.getElementById('total-rev').innerText = sTotal.toLocaleString('vi-VN');
        document.getElementById('tg-rev').innerText = sTG.toLocaleString('vi-VN');
    }
    function saveData() {
        const data = {};
        document.querySelectorAll('input').forEach(input => { data[input.id] = input.value; });
        localStorage.setItem('reportData', JSON.stringify(data));
    }
    function setToday() {
        const now = new Date();
        document.getElementById('date-display').innerText = `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}`;
    }
    window.onload = function() {
        setToday(); // luôn hiển thị ngày hiện tại, không phụ thuộc dữ liệu đã lưu
        const saved = localStorage.getItem('reportData');
        if (saved) {
            const data = JSON.parse(saved);
            Object.keys(data).forEach(id => {
                if (id === 'date-display') return; // bỏ qua ngày đã lưu trước đó
                const el = document.getElementById(id);
                if (el) el.value = data[id];
            });
            calc();
        }
    };
    function resetData() { 
        if(confirm("Bạn có chắc muốn xóa tất cả dữ liệu?")) {
            document.querySelectorAll('.data-input').forEach(i => i.value = ''); 
            localStorage.removeItem('reportData');
            calc(); 
        }
    }
</script>
</body>
</html>
