<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Báo Cáo Cao Cấp</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #0f172a; color: #f8fafc; touch-action: manipulation; }
        
        .container { min-width: 350px; padding: 15px; }
        
        /* HEADER NỔI BẬT */
        .header { background: linear-gradient(160deg, #1e293b, #0f172a); border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .title { font-size: 16px; font-weight: 700; color: #cbd5e1; }
        .btn-reset { background: #be123c; color: white; border: none; padding: 5px 12px; border-radius: 10px; font-size: 10px; font-weight: 700; cursor: pointer; }
        
        .grid-header { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .input-box { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 8px; text-align: center; }
        .label { font-size: 8px; text-transform: uppercase; color: #94a3b8; margin-bottom: 4px; font-weight: 600; }
        .input-val, .stat-val { color: #f8fafc; font-size: 12px; font-weight: 700; }
        .input-val { background: none; border: none; width: 100%; text-align: center; outline: none; }

        /* BẢNG SANG TRỌNG */
        .table-wrap { background: #ffffff; border-radius: 20px; padding: 10px; overflow-x: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        table { width: 100%; border-collapse: collapse; }
        th { font-size: 9px; color: #64748b; padding: 10px 5px; text-transform: uppercase; text-align: center; border-bottom: 1px solid #f1f5f9; }
        td { padding: 4px 2px; text-align: center; border-bottom: 1px solid #f8fafc; }
        
        .sticky-col { position: sticky; left: 0; background: white; font-weight: 600; font-size: 10px; color: #1e293b; text-align: left; }
        .hs-col { color: #e11d48; font-weight: 700; font-size: 10px; }
        .cell-input { width: 100%; height: 28px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; text-align: center; font-size: 10px; font-weight: 600; color: #334155; }
        .cell-input:focus { border-color: #3b82f6; background: #eff6ff; }
        .dtqd-col { color: #0f172a; font-weight: 700; font-size: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="header-top">
            <div class="title">BÁO CÁO QUY ĐỔI</div>
            <button onclick="resetData()" class="btn-reset">XÓA</button>
        </div>
        <div class="grid-header">
            <div class="input-box"><div class="label">Tên NV</div><input type="text" id="nv-name" class="input-val" oninput="saveData()"></div>
            <div class="input-box"><div class="label">Tổng DT</div><div id="total-rev" class="stat-val">0</div></div>
            <div class="input-box"><div class="label">Quy đổi</div><div id="h1" class="stat-val">0%</div></div>
            <div class="input-box"><div class="label">Ngày</div><input type="text" id="date-display" class="input-val" oninput="saveData()"></div>
            <div class="input-box"><div class="label">DT Góp</div><div id="tg-rev" class="stat-val">0</div></div>
            <div class="input-box"><div class="label">Trả Góp</div><div id="i1" class="stat-val">0%</div></div>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Nhóm</th><th>Hệ số</th><th>SL</th><th>T.Mặt</th><th>T.Góp</th><th>Ví</th><th>DTQĐ</th><th>PMH</th><th>K.thác</th>
                </tr>
            </thead>
            <tbody id="data-rows"></tbody>
        </table>
    </div>
</div>

<script>
    const config = [
        { n: 'Tivi', hs: 1.0 }, { n: 'Tủ lạnh', hs: 1.0 }, { n: 'Smartphone', hs: 1.0 },
        { n: 'Tablet/Lap', hs: 1.2 }, { n: 'ĐGD/MLN', hs: 1.85 }, { n: 'DCNB', hs: 1.92 },
        { n: 'VAS', hs: 3.3 }, { n: 'Bảo hiểm', hs: 4.18 }, { n: 'Sim', hs: 5.45 },
        { n: 'Phụ kiện', hs: 3.37 }, { n: 'Đồng hồ', hs: 3.0 }, { n: 'Loa Kara', hs: 1.29 }
    ];

    const tbody = document.getElementById('data-rows');
    config.forEach((item, i) => {
        const row = document.createElement('tr');
        row.innerHTML = `<td class="sticky-col">${item.n}</td>
            <td class="hs-col">${Math.round(item.hs * 100)}%</td>
            <td><input type="text" class="cell-input data-input" id="sl-${i}" oninput="format(this); calc(); saveData();"></td>
            <td><input type="text" id="d-${i}" class="cell-input data-input" oninput="format(this); calc(); saveData();"></td>
            <td><input type="text" id="e-${i}" class="cell-input data-input" oninput="format(this); calc(); saveData();"></td>
            <td><input type="text" id="f-${i}" class="cell-input data-input" oninput="format(this); calc(); saveData();"></td>
            <td id="g-${i}" class="dtqd-col"></td>
            <td><input type="text" class="cell-input data-input" id="pmh-${i}" oninput="saveData()"></td>
            <td><input type="text" class="cell-input data-input" id="kt-${i}" oninput="saveData()"></td>`;
        tbody.appendChild(row);
    });

    function format(e) { e.value = e.value.replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
    function getV(id) { return parseFloat(document.getElementById(id).value.replace(/\./g, "")) || 0; }
    
    function calc() {
        let sDF = 0, sEF = 0, sG = 0, sTotal = 0, sTG = 0;
        config.forEach((item, i) => {
            const d = getV(`d-${i}`), e = getV(`e-${i}`), f = getV(`f-${i}`);
            const df = d + e + f, ef = e + f;
            sTotal += df; sTG += ef;
            if(df > 0) {
                const g = (df * item.hs) + (ef * 0.3);
                document.getElementById(`g-${i}`).innerText = Math.round(g).toLocaleString('vi-VN');
                sG += g; sDF += df; sEF += ef;
            } else document.getElementById(`g-${i}`).innerText = '';
        });
        document.getElementById('h1').innerText = sDF ? Math.round(sEF/sDF*100) + '%' : '0%';
        document.getElementById('i1').innerText = sDF ? Math.round((sG-sDF)/sDF*100) + '%' : '0%';
        document.getElementById('total-rev').innerText = sTotal.toLocaleString('vi-VN');
        document.getElementById('tg-rev').innerText = sTG.toLocaleString('vi-VN');
    }

    function saveData() {
        const data = {};
        document.querySelectorAll('input').forEach(input => { data[input.id] = input.value; });
        localStorage.setItem('reportData', JSON.stringify(data));
    }

    window.onload = function() {
        const saved = localStorage.getItem('reportData');
        if (saved) {
            const data = JSON.parse(saved);
            Object.keys(data).forEach(id => { const el = document.getElementById(id); if (el) el.value = data[id]; });
            calc();
        } else {
            const now = new Date();
            document.getElementById('date-display').value = `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}`;
        }
    };

    function resetData() { 
        if(confirm('Xóa sạch dữ liệu báo cáo?')) {
            document.querySelectorAll('.data-input').forEach(i => i.value = ''); 
            localStorage.removeItem('reportData');
            calc(); 
        }
    }
</script>
</body>
</html>
