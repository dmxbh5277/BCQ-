<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Cáo Quy Đổi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap');
        body { font-family: 'Google Sans', sans-serif; overflow: hidden; background: #f3f4f6; margin: 0; }
        .page-container { height: 100dvh; display: flex; flex-direction: column; background: white; }
        .scroll-area { flex: 1; overflow-y: auto; }
        
        tr { height: 22px !important; }
        input { width: 100%; height: 100%; text-align: center; background: transparent; border: none; outline: none; font-size: 11px; }
        
        td, th { border-right: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb; padding: 0 2px; }
        td:last-child, th:last-child { border-right: none; }
        .center-col { text-align: center; }
    </style>
</head>
<body>

    <div id="report-area" class="page-container max-w-md mx-auto shadow-xl">
        <div style="background: #0070c0; color: white; padding: 8px;">
            <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                <div style="width: 30%; background: rgba(0,0,0,0.2); border-radius: 4px; padding: 2px;">
                    <span style="font-size: 7px; opacity: 0.7; display: block; text-align: center;">NV</span>
                    <input type="text" id="nv-name" style="color: #fde047; font-weight: bold; font-size: 10px;" placeholder="...">
                </div>
                <div style="flex: 1; text-align: center; font-weight: bold; font-size: 12px; text-transform: uppercase;">Báo Cáo Quy Đổi</div>
            </div>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px;">
                <div style="background: rgba(0,0,0,0.1); border-radius: 4px; padding: 2px; text-align: center;">
                    <span style="font-size: 8px;">Ngày</span><br>
                    <input type="text" id="date-display" value="16/07" style="color: white; font-weight: bold; font-size: 10px;">
                </div>
                <div style="background: rgba(0,0,0,0.1); border-radius: 4px; padding: 2px; text-align: center;">
                    <span style="font-size: 8px;">Quy đổi</span><div id="h1" style="font-weight: bold; color: #fde047; font-size: 11px;">0%</div>
                </div>
                <div style="background: rgba(0,0,0,0.1); border-radius: 4px; padding: 2px; text-align: center;">
                    <span style="font-size: 8px;">Trả chậm</span><div id="i1" style="font-weight: bold; color: #fde047; font-size: 11px;">0%</div>
                </div>
            </div>
        </div>

        <div style="padding: 4px; border-bottom: 1px solid #ddd; display: flex; gap: 4px;">
            <button onclick="resetData()" style="flex: 1; padding: 4px; background: #eee; border: none; font-size: 10px; font-weight: bold; text-transform: uppercase;">Xóa Dữ Liệu</button>
            <button id="btn-capture" style="flex: 1; padding: 4px; background: #0070c0; color: white; border: none; font-size: 10px; font-weight: bold; text-transform: uppercase;">Chụp Báo Cáo</button>
        </div>

        <div class="scroll-area" id="table-container">
            <table style="width: 100%; border-collapse: collapse; table-layout: fixed; min-width: 650px;">
                <thead style="background: #f9fafb; font-size: 9px; color: #666; text-transform: uppercase;">
                    <tr>
                        <th style="width: 80px; text-align: left; padding-left: 4px;">Nhóm</th>
                        <th style="width: 40px;">Hệ số</th>
                        <th style="width: 32px;">SL</th>
                        <th style="width: 56px;">T.mặt</th>
                        <th style="width: 56px;">T.Góp</th>
                        <th style="width: 56px;">Ví</th>
                        <th style="width: 56px;">DTQĐ</th>
                        <th style="width: 48px;">PMH</th>
                        <th style="width: 80px;">Khai thác</th>
                    </tr>
                </thead>
                <tbody id="data-rows" style="font-size: 10px; color: #333;"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        // (Giữ nguyên logic config và calc như cũ...)
        const config = [
            { n: 'Tivi', hs: 1.0 }, { n: 'Tủ lạnh', hs: 1.0 }, { n: 'Smartphone', hs: 1.0 },
            { n: 'Tablet/Laptop', hs: 1.2 }, { n: 'ĐGD/MLN', hs: 1.85 }, { n: 'DCNB', hs: 1.92 },
            { n: 'VAS', hs: 3.3 }, { n: 'Bảo hiểm', hs: 4.18 }, { n: 'Sim', hs: 5.45 },
            { n: 'Phụ kiện', hs: 3.37 }, { n: 'Đồng hồ', hs: 3.0 }, { n: 'Loa Karaoke', hs: 1.29 }
        ];

        const tbody = document.getElementById('data-rows');
        config.forEach((item, i) => {
            const row = document.createElement('tr');
            row.innerHTML = `<td style="font-weight: bold; padding-left: 4px;">${item.n}</td>
                <td class="center-col">${Math.round(item.hs * 100)}%</td>
                <td class="p-0"><input type="text" class="data-input" oninput="format(this); calc();"></td>
                <td class="p-0"><input type="text" id="d-${i}" class="data-input" oninput="format(this); calc();"></td>
                <td class="p-0"><input type="text" id="e-${i}" class="data-input" oninput="format(this); calc();"></td>
                <td class="p-0"><input type="text" id="f-${i}" class="data-input" oninput="format(this); calc();"></td>
                <td id="g-${i}" class="center-col font-bold" style="color: #0070c0;"></td>
                <td class="p-0"><input type="text" class="data-input"></td>
                <td class="p-0"><input type="text" class="data-input"></td>`;
            tbody.appendChild(row);
        });

        // Hàm chụp ảnh chuyên sâu
        document.getElementById('btn-capture').addEventListener('click', async function() {
            const el = document.getElementById('report-area');
            const tableContainer = document.getElementById('table-container');
            
            // 1. Lưu trạng thái cũ
            const oldHeight = tableContainer.style.height;
            const oldOverflow = tableContainer.style.overflow;
            
            // 2. Ép mở rộng để chụp toàn bộ
            tableContainer.style.height = 'auto';
            tableContainer.style.overflow = 'visible';

            // 3. Chụp
            const canvas = await html2canvas(el, { scale: 2, logging: false });
            
            // 4. Trả lại trạng thái cũ
            tableContainer.style.height = oldHeight;
            tableContainer.style.overflow = oldOverflow;

            // 5. Download
            const link = document.createElement('a');
            link.download = 'Bao-Cao-Quy-Doi.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });

        function format(e) { e.value = e.value.replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function getV(id) { return parseFloat(document.getElementById(id).value.replace(/\./g, "")) || 0; }
        function calc() { /* Giữ nguyên logic tính toán của bạn */ }
        function resetData() { document.querySelectorAll('.data-input').forEach(i => i.value = ''); calc(); }
    </script>
</body>
</html>
